name: Actualizar Playlist Spotify
on:
  schedule:
    - cron: '0 11,23 * * 1-5' # lunes a viernes (Ajustado a UTC)
  workflow_dispatch:

jobs:
  run-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          persist-credentials: 'true' # Asegura que GITHUB_TOKEN este disponible para git push
          fetch-depth: '0' # fetch completo

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Inyectar Caché de Spotify
        run: echo '${{ secrets.SPOTIPY_CACHE }}' > .cache

      - name: Correr script
        run: python main.py
        env:
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_REDIRECT_URI: ${{ secrets.SPOTIPY_REDIRECT_URI }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}

      - name: Commit y Push de estadísticas semanales
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add stats/*.md 2>/dev/null || true
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Estadísticas semanales generadas [skip ci]"
            git push
          else
            echo "No hay cambios en stats/*.md — nada que commitear."
          fi
